<!DOCTYPE html>
<html lang="en">
<head>
  <!--
  ══════════════════════════════════════════════════════════════════════════════
  RESOURCE HINT STRATEGY
  ══════════════════════════════════════════════════════════════════════════════
  preconnect  → opens TCP + TLS handshake for domains we will fetch *from JS*.
                Saves ~200–500 ms RTT per domain on mobile 4G.
  dns-prefetch → cheaper fallback (DNS only) for domains whose timing is less
                 certain. Zero risk — browser ignores if not needed.
  preload     → instructs the browser to fetch the splash logo *before* it
                parses the rest of the document so the loading screen is instant.
  ══════════════════════════════════════════════════════════════════════════════
  -->

  <!-- Firebase SDK domains — opened before dart2js even starts -->
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://firebase.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fcmregistrations.googleapis.com" crossorigin>

  <!-- Google Fonts (used by the app) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- DNS-only prefetch for domains whose timing is less predictable -->
  <link rel="dns-prefetch" href="https://www.googletagmanager.com">
  <link rel="dns-prefetch" href="https://accounts.google.com">
  <link rel="dns-prefetch" href="https://storage.googleapis.com">

  <!-- Preload the splash logo so the loading screen shows instantly.
       Without this, the browser discovers the <img> only after it finishes
       parsing the rest of <head>, causing a visible blank moment. -->
  <link rel="preload" as="image" href="assets/assets/images/lionfm_logo.png"
        fetchpriority="high" type="image/png">

  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma"        content="no-cache">
  <meta http-equiv="Expires"       content="0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FMStream — Radio Streaming Platform</title>
  <meta name="description" content="FMStream gives FM radio stations their own branded streaming app and web player. Get your station online in minutes.">
  <meta name="keywords" content="FMStream, radio streaming, FM radio, online radio, branded radio app, station streaming">

  <!-- Open Graph -->
  <meta property="og:title" content="FMStream — Radio Streaming Platform">
  <meta property="og:description" content="FMStream gives FM radio stations their own branded streaming app and web player. Get your station online in minutes.">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta property="og:url" content="https://app.fmstream.online">
  <link rel="canonical" href="https://app.fmstream.online">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="FMStream">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FMStream — Radio Streaming Platform">
  <meta name="twitter:description" content="FMStream gives FM radio stations their own branded streaming app and web player. Get your station online in minutes.">
  <meta name="twitter:image" content="icons/Icon-512.png">

  <!-- Google OAuth (Google Sign-In requires this meta tag at parse time) -->
  <meta name="google-signin-client_id"
        content="748866798356-l2d6q36gp1444loj06jujj0rgkf5aati.apps.googleusercontent.com">

  <!-- Google Identity Services — async + defer: downloads in parallel with
       HTML parsing, executes only after the DOM is fully built. This prevents
       the GIS script from blocking the Flutter bootstrap. -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Google Analytics — defer prevents gtag from stalling the parser.
       'send_page_view: false' avoids a double page-view when Firebase Analytics
       (loaded by the Dart bundle) also fires on the same navigation. -->
  <script defer src="https://www.googletagmanager.com/gtag/js?id=G-0XKZHG6Z5K"></script>
  <script>
    // Lightweight inline config — runs after DOM is ready (paired with defer above).
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0XKZHG6Z5K', { 'send_page_view': false });
  </script>

  <meta name="theme-color" content="#15E0B4">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FMStream">

  <!-- Icons -->
  <link rel="icon" type="image/png" href="icons/Icon-32.png"/>
  <link rel="shortcut icon" type="image/png" href="icons/Icon-32.png"/>
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">

  <style>
    /* ── Critical inline CSS — zero network round-trip ───────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0A0A0A;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Inter', -apple-system, sans-serif;
      overflow: hidden;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      opacity: 1;
      transition: opacity 0.4s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .glow-blob {
      position: fixed;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30,155,67,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: glowPulse 2s ease-in-out infinite alternate;
    }
    @keyframes glowPulse {
      from { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
      to   { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
    }

    .logo-img {
      width: 240px; height: 240px;
      object-fit: contain;
      /* preloaded above — will display without a render-blocking round-trip */
      animation: logoBounce 0.6s cubic-bezier(.36,.07,.19,.97) forwards,
                 logoFloat 2.5s ease-in-out 0.6s infinite alternate;
    }
    @keyframes logoBounce {
      0%   { opacity: 0; transform: scale(0.5); }
      70%  { opacity: 1; transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    @keyframes logoFloat {
      from { transform: translateY(0px); }
      to   { transform: translateY(-8px); }
    }

    .tagline {
      color: rgba(245,244,239,0.5);
      font-size: 13px;
      font-style: italic;
      animation: fadeIn 0.5s ease 0.8s both;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .equalizer {
      display: flex; align-items: flex-end;
      gap: 4px; height: 32px;
      animation: fadeIn 0.5s ease 1s both;
    }
    .eq-bar {
      width: 4px; border-radius: 2px;
      animation: eqBounce var(--dur, 0.6s) ease-in-out infinite alternate;
    }
    @keyframes eqBounce {
      from { height: var(--min-h, 6px); }
      to   { height: var(--max-h, 28px); }
    }
  </style>
</head>
<body>
  <div class="glow-blob"></div>
  <div id="loading">
    <picture>
      <source srcset="assets/assets/images/lion_fm_logo.webp" type="image/webp">
      <img class="logo-img"
           src="assets/assets/images/lionfm_logo.png"
           fetchpriority="high"
           onerror="this.style.display='none';
                    document.getElementById('logo-fallback').style.display='flex';"
           alt="Lion FM">
    </picture>
    <div id="logo-fallback" style="display:none;width:120px;height:120px;
         background:linear-gradient(135deg,#1E9B43,#28D7D2);border-radius:28px;
         align-items:center;justify-content:center;flex-direction:column;
         box-shadow:0 0 32px rgba(30,155,67,0.4);">
      <span style="color:rgba(10,10,10,0.8);font-size:13px;font-weight:700;letter-spacing:3px;">LION</span>
      <span style="color:#0A0A0A;font-size:38px;font-weight:900;line-height:1;">FM</span>
      <span style="color:rgba(10,10,10,0.6);font-size:10px;letter-spacing:1px;">91.1 MHz</span>
    </div>
    <div class="tagline">...Your interactive radio</div>
    <div class="equalizer" id="eq"></div>
  </div>

  <script>
    // Equalizer bars — pure DOM, zero library dependency
    (function() {
      var eq = document.getElementById('eq');
      var colors = ['#1E9B43','#1E9B43','#28D7D2','#28D7D2','#C89A29','#28D7D2','#28D7D2','#1E9B43','#1E9B43'];
      for (var i = 0; i < 9; i++) {
        var bar = document.createElement('div');
        bar.className = 'eq-bar';
        var minH = (6  + Math.random() * 8).toFixed(0);
        var maxH = (16 + Math.random() * 16).toFixed(0);
        var dur  = (0.4 + Math.random() * 0.5).toFixed(2);
        bar.style.cssText =
          '--min-h:' + minH + 'px;--max-h:' + maxH + 'px;--dur:' + dur + 's;' +
          'background:' + colors[i] + ';animation-delay:' + (i * 0.07) + 's';
        eq.appendChild(bar);
      }
    })();

    // Fade out the loading screen once Flutter paints its first frame.
    // 'flutter-first-frame' is dispatched by flutter_bootstrap.js.
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('loading');
      if (loading) loading.classList.add('hidden');
    });

    // Unlock Web Audio API on first user gesture — required on iOS Safari.
    document.addEventListener('click', function() {
      if (window._flutterAudioUnlocked) return;
      var a = new Audio();
      a.play().catch(function(){});
      window._flutterAudioUnlocked = true;
    }, { once: true });

    // Reload the page when a new service worker takes over an existing tab so
    // users automatically receive the latest build without a manual hard-refresh.
    // We snapshot the controller before registration so we only reload on an
    // UPDATE (controller already existed), not on the very first SW install.
    if ('serviceWorker' in navigator) {
      var _swPrevController = navigator.serviceWorker.controller;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (_swPrevController && !window._swReloading) {
          window._swReloading = true;
          window.location.reload();
        }
      });
    }
  </script>

  <!--
  flutter_bootstrap.js carries the async attribute:
  • The browser downloads it in parallel with any remaining HTML parsing.
  • It does NOT block the parser while executing.
  • Flutter handles the rest (loading main.dart.js, deferred chunks, CanvasKit).
  Nothing else should be loaded synchronously after this point.
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
