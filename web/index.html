  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0A0A0A;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Inter', -apple-system, sans-serif;
      overflow: hidden;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      opacity: 1;
      transition: opacity 0.4s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    /* Glow blob */
    .glow-blob {
      position: fixed;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30,155,67,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: glowPulse 2s ease-in-out infinite alternate;
    }
    @keyframes glowPulse {
      from { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
      to   { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
    }

    /* Logo image */
    .logo-img {
      width: 180px;
      height: 180px;
      object-fit: contain;
      image-rendering: -webkit-optimize-contrast;
      animation: logoFloat 2.5s ease-in-out infinite alternate, logoBounce 0.6s cubic-bezier(.36,.07,.19,.97) forwards;
    }
    @keyframes logoBounce {
      0%   { opacity: 0; transform: scale(0.5); }
      70%  { opacity: 1; transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    @keyframes logoFloat {
      from { transform: translateY(0px); }
      to   { transform: translateY(-8px); }
    }

    /* Tagline */
    .tagline {
      color: rgba(245,244,239,0.5);
      font-size: 13px;
      font-style: italic;
      animation: fadeIn 0.5s ease 0.8s both;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Equalizer bars */
    .equalizer {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 32px;
      animation: fadeIn 0.5s ease 1s both;
    }
    .eq-bar {
      width: 4px;
      border-radius: 2px;
      animation: eqBounce var(--dur, 0.6s) ease-in-out infinite alternate;
    }
    @keyframes eqBounce {
      from { height: var(--min-h, 6px); }
      to   { height: var(--max-h, 28px); }
    }
  </style>
</head>
<body>
  <div class="glow-blob"></div>
  <div id="loading">
    <img class="logo-img" src="assets/assets/images/lionfm_logo.png"
         onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex';"
         alt="Lion FM">
    <div id="logo-fallback" style="display:none;width:120px;height:120px;background:linear-gradient(135deg,#1E9B43,#28D7D2);border-radius:28px;align-items:center;justify-content:center;flex-direction:column;box-shadow:0 0 32px rgba(30,155,67,0.4);">
      <span style="color:rgba(10,10,10,0.8);font-size:13px;font-weight:700;letter-spacing:3px;">LION</span>
      <span style="color:#0A0A0A;font-size:38px;font-weight:900;line-height:1;">FM</span>
      <span style="color:rgba(10,10,10,0.6);font-size:10px;letter-spacing:1px;">91.1 MHz</span>
    </div>
    <div class="tagline">...Your interactive radio</div>
    <div class="equalizer" id="eq"></div>
  </div>

  <script>
    // Build equalizer bars
    var eq = document.getElementById('eq');
    var colors = ['#1E9B43','#1E9B43','#28D7D2','#28D7D2','#C89A29','#28D7D2','#28D7D2','#1E9B43','#1E9B43'];
    for (var i = 0; i < 9; i++) {
      var bar = document.createElement('div');
      bar.className = 'eq-bar';
      var minH = (6 + Math.random() * 8).toFixed(0);
      var maxH = (16 + Math.random() * 16).toFixed(0);
      var dur  = (0.4 + Math.random() * 0.5).toFixed(2);
      bar.style.cssText = '--min-h:' + minH + 'px;--max-h:' + maxH + 'px;--dur:' + dur + 's;background:' + colors[i] + ';animation-delay:' + (i * 0.07) + 's';
      eq.appendChild(bar);
    }

    // Hide loading screen once Flutter renders first frame
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading').classList.add('hidden');
    });

    // Unlock audio on first user gesture
    document.addEventListener('click', function() {
      if (window._flutterAudioUnlocked) return;
      var a = new Audio();
      a.play().catch(function(){});
      window._flutterAudioUnlocked = true;
    }, { once: true });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
