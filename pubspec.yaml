name: lionfm
description: Lion FM 91.1 MHz — Official Campus Radio of University of Nigeria, Nsukka
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Audio
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  just_audio_background: ^0.0.1-beta.12

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # HTTP & API
  dio: ^5.4.3

  # Firebase
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.0
  firebase_analytics: ^11.3.0

  # Local storage
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.0.2

  # Platform
  flutter_local_notifications: ^17.2.2
  permission_handler: ^11.3.1
  timezone: ^0.9.4

  # Auth
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1
  sign_in_with_apple: ^6.1.4

  # Ads
  google_mobile_ads: ^5.1.0

  # Charts
  fl_chart: ^0.69.0

  # Firebase / Storage
  firebase_storage: ^12.3.6
  cloud_firestore: ^5.4.4

  # File / Image pickers
  file_picker: ^8.1.2
  image_picker: ^1.1.2

  # CSV export
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
